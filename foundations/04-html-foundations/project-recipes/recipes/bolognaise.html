    <h2>Classic Spaghetti Bolognaise</h2>
    <p>A timeless Italian pasta dish with a rich and savory meat sauce. This hearty bolognaise is comfort food at its finest, perfect for weeknight dinners with the whole family.</p>
    <h2>Ingrediants</h2>
    <ul>
        <li>675g ground beef</li>
        <li>1 onion, diced</li>
        <li>3 garlic cloves, minced</li>
        <li>800g canned tomatoes</li>
        <li>500g spaghetti</li>
    </ul>
    <h2>Steps</h2>
    <ol>
        <li>Heat oil in a large pan over medium-high heat</li>
        <li>Add onion and garlic, cook until softened about 2 minutes</li>
        <li>Add ground beef and cook until browned, breaking it up as it cooks</li>
        <li>Add canned tomatoes and simmer for 15 minutes</li>
        <li>Cook spaghetti according to package directions</li>
        <li>Drain pasta and add to the meat sauce</li>
        <li>Toss everything together and serve hot</li>
    </ol>
</body>
